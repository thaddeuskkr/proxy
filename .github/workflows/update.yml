name: Update proxy configurations

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"
      timezone: "Asia/Singapore"

permissions:
  contents: write

concurrency:
  group: update-proxy-configs
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Validate generator syntax
        run: python -m py_compile merge_lists.py

      - name: Generate proxy lists
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python merge_lists.py \
            --source-dir source \
            --defaults-dir defaults \
            --output-dir output \
            --report-json output/report.json \
            --report-md output/report.md

      - name: Commit generated config changes
        run: |
          if [ -z "$(git status --porcelain -- output)" ]; then
            echo "No generated config changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          generated_at="$(TZ=Asia/Singapore date '+%Y-%m-%d %H:%M:%S %Z')"
          git add output
          git commit -m "chore: update generated proxy configurations [${generated_at}]"
          git push
