name: Update proxy configurations

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"
      timezone: "Asia/Singapore"

permissions:
  contents: write

concurrency:
  group: update-proxy-configs
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Generate proxy lists
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 merge_lists.py \
            --source-dir source \
            --output-dir output

      - name: Commit generated config changes
        run: |
          if [ -z "$(git status --porcelain -- output)" ]; then
            echo "No generated config changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output
          git commit -m "chore: update generated proxy configurations"
          git push
